        let audioCtx = null;
        
        function initAudio() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
        
        function playSound(freq) {
            if (!musicOn || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.15;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                osc.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }
        
        function vibrate() {
            const set = DIFFICULTY[game.difficulty];
            if (set.vibrate && navigator.vibrate) navigator.vibrate(200);
        }
        
        const el = {
            score: document.getElementById('score'),
            lives: document.getElementById('lives'),
            timer: document.getElementById('timer'),
            title: document.getElementById('title'),
            author: document.getElementById('author'),
            examTag: document.getElementById('examTag'),
            questionType: document.getElementById('questionType'),
            question: document.getElementById('question'),
            input: document.getElementById('answerInput'),
            result: document.getElementById('result')
        };
        
        function normalize(s) { return s.replace(/[，。！？、；：\s]/g, '').trim(); }
        
        function highlightWrongWords(text, wrongWords) {
            if (!wrongWords) return text;
            let result = text;
            for (let w of wrongWords) {
                const regex = new RegExp(w, 'g');
                result = result.replace(regex, `<span class="wrong-word">${w}</span>`);
            }
            return result;
        }
        
        function getWrongQuestion() {
            if (wrongQuestions.length === 0) return null;
            const available = wrongQuestions.filter(q => (questionCount - q.lastWrongTime) >= 3);
            if (available.length === 0) return null;
            available.sort((a, b) => b.wrongCount - a.wrongCount);
            return available[0];
        }
        
        function addWrongQuestion(poem, pairIndex, questionType) {
            const existing = wrongQuestions.find(q => 
                q.poemTitle === poem.title && q.pairIndex === pairIndex
            );
            if (existing) {
                existing.wrongCount++;
                existing.lastWrongTime = questionCount;
            } else {
                wrongQuestions.push({
                    poemTitle: poem.title,
                    pairIndex: pairIndex,
                    questionType: questionType,
                    wrongCount: 1,
                    lastWrongTime: questionCount
                });
            }
        }
        
        function removeWrongQuestion(poem, pairIndex) {
            wrongQuestions = wrongQuestions.filter(q => 
                !(q.poemTitle === poem.title && q.pairIndex === pairIndex)
            );
        }
        
        function newQuestion() {
            if (waitingToNext) return;
            if (!game.active && game.lives > 0) { resetGame(); return; }
            stopTimer();
            
            let selectedPoem = null;
            let selectedPair = null;
            let selectedPairIndex = -1;
            
            const wrongQ = getWrongQuestion();
            if (wrongQ) {
                const poemIndex = POEMS.findIndex(p => p.title === wrongQ.poemTitle);
                if (poemIndex !== -1) {
                    selectedPoem = POEMS[poemIndex];
                    selectedPairIndex = wrongQ.pairIndex;
                    selectedPair = selectedPoem.pairs[selectedPairIndex];
                    game.questionType = (wrongQ.questionType === "upper") ? "lower" : "upper";
                }
            }
            
            if (!selectedPoem) {
                const poemIdx = Math.floor(Math.random() * POEMS.length);
                selectedPoem = POEMS[poemIdx];
                selectedPairIndex = Math.floor(Math.random() * selectedPoem.pairs.length);
                selectedPair = selectedPoem.pairs[selectedPairIndex];
                game.questionType = Math.random() < 0.5 ? "upper" : "lower";
            }
            
            game.currentPoem = selectedPoem;
            game.currentPair = selectedPair;
            game.currentPairIndex = selectedPairIndex;
            questionCount++;
            
            el.title.textContent = game.currentPoem.title;
            el.author.textContent = `—— ${game.currentPoem.author} ——`;
            
            if (game.currentPoem.examYear) {
                el.examTag.innerHTML = `📌 真题考点 ${game.currentPoem.examYear}年考过`;
                el.examTag.className = "exam-tag high";
            } else {
                el.examTag.innerHTML = `📚 必背篇目`;
                el.examTag.className = "exam-tag";
            }
            
            let displayText = "";
            let wrongWords = [];
            if (game.questionType === "upper") {
                el.questionType.innerHTML = "📝 题型一：根据上句，填写下句";
                displayText = game.currentPair.upper;
                wrongWords = game.currentPair.wrongWords || [];
                el.question.innerHTML = `「${highlightWrongWords(displayText, wrongWords)}」<br><span style="font-size:0.9rem; color:#D2691E;">请填写下句：</span>`;
            } else {
                el.questionType.innerHTML = "📝 题型二：根据下句，填写上句";
                displayText = game.currentPair.lower;
                wrongWords = game.currentPair.wrongWords || [];
                el.question.innerHTML = `「${highlightWrongWords(displayText, wrongWords)}」<br><span style="font-size:0.9rem; color:#D2691E;">请填写上句：</span>`;
            }
            
            el.input.value = "";
            el.result.innerHTML = "✨ 根据题目，填写正确答案 ✨";
            el.result.style.color = '#4A3B22';
            startTimer();
        }
        
        function stopTimer() { if (game.timer) { clearInterval(game.timer); game.timer = null; } }
        
        function startTimer() {
            stopTimer();
            const set = DIFFICULTY[game.difficulty];
            game.timeLeft = set.time;
            el.timer.textContent = `⏱️ ${game.timeLeft}s`;
            el.timer.classList.remove('warning');
            game.timer = setInterval(() => {
                if (!game.active || waitingToNext) return;
                if (game.timeLeft <= 0) {
                    stopTimer();
                    loseLife("⏰ 时间到！");
                } else {
                    game.timeLeft--;
                    el.timer.textContent = `⏱️ ${game.timeLeft}s`;
                    if (game.timeLeft <= 5) el.timer.classList.add('warning');
                }
            }, 1000);
        }
        
        function loseLife(reason) {
            game.lives--;
            updateUI();
            playSound(220);
            vibrate();
            
            let correctAnswer = "";
            if (game.questionType === "upper") {
                correctAnswer = game.currentPair.lower;
            } else {
                correctAnswer = game.currentPair.upper;
            }
            
            addWrongQuestion(game.currentPoem, game.currentPairIndex, game.questionType);
            
            el.result.innerHTML = `${reason} ❌ 生命-1，剩余 ${game.lives}<br><br><span style="color:#228B22; font-weight:bold; font-size:1rem;">📖 正确答案：「${correctAnswer}」</span><br><br><span class="waiting-text">⏰ 5秒后自动进入下一题...</span>`;
            el.result.style.color = '#DC143C';
            
            waitingToNext = true;
            if (nextTimeout) clearTimeout(nextTimeout);
            nextTimeout = setTimeout(() => {
                waitingToNext = false;
                if (game.lives <= 0) {
                    gameOver();
                } else {
                    newQuestion();
                }
            }, 5000);  // 5秒停留
            
            if (game.lives <= 0) {
                if (nextTimeout) clearTimeout(nextTimeout);
                waitingToNext = false;
                gameOver();
            }
        }
        
        function gameOver() {
            game.active = false;
            stopTimer();
            el.result.innerHTML = `💀 游戏结束！得分：${game.score}<br>点击下一题重新开始`;
        }
        
        function resetGame() {
            if (nextTimeout) clearTimeout(nextTimeout);
            waitingToNext = false;
            const set = DIFFICULTY[game.difficulty];
            game.score = 0; game.lives = set.lives; game.active = true;
            wrongQuestions = [];
            questionCount = 0;
            updateUI();
            newQuestion();
        }
        
        function updateUI() {
            el.score.textContent = game.score;
            el.lives.textContent = game.lives;
        }
        
        function checkAnswer() {
            if (!game.active && game.lives <= 0) { resetGame(); return; }
            if (waitingToNext) {
                el.result.innerHTML = "⏳ 请等待5秒后再答题...";
                return;
            }
            
            const user = el.input.value.trim();
            // 禁止提交空白
            if (!user) { 
                el.result.innerHTML = `❌ 答案不能为空！请输入您的答案`;
                el.result.style.color = '#DC143C';
                return; 
            }
            
            const set = DIFFICULTY[game.difficulty];
            let correctAnswer = "";
            let userNorm = normalize(user);
            let correctNorm = "";
            
            if (game.questionType === "upper") {
                correctAnswer = game.currentPair.lower;
                correctNorm = normalize(correctAnswer);
            } else {
                correctAnswer = game.currentPair.upper;
                correctNorm = normalize(correctAnswer);
            }
            
            if (userNorm === correctNorm) {
                game.score += set.score;
                updateUI();
                playSound(523);
                removeWrongQuestion(game.currentPoem, game.currentPairIndex);
                el.result.innerHTML = `✅ 妙哉！+${set.score}分<br><br><span style="color:#228B22;">📖 正确答案：「${correctAnswer}」</span>`;
                el.result.style.color = '#228B22';
                newQuestion();
            } else {
                loseLife(`❌ 惜乎！`);
            }
        }
        
        function skipToNext() {
            if (waitingToNext) {
                if (nextTimeout) clearTimeout(nextTimeout);
                waitingToNext = false;
                newQuestion();
            }
        }
        
        function changeDifficulty(diff) {
            if (nextTimeout) clearTimeout(nextTimeout);
            waitingToNext = false;
            game.difficulty = diff;
            const set = DIFFICULTY[diff];
            game.score = 0; game.lives = set.lives; game.active = true;
            wrongQuestions = [];
            questionCount = 0;
            updateUI();
            newQuestion();
            document.querySelectorAll('.diff-btn').forEach(btn => {
                if (btn.dataset.diff === diff) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            el.result.innerHTML = `已切换到【${set.name}】模式`;
        }
        
        function toggleMusic() {
            musicOn = !musicOn;
            document.getElementById('musicBtn').textContent = musicOn ? '🎵' : '🔇';
        }
        
        document.getElementById('submitBtn').onclick = checkAnswer;
        document.getElementById('nextBtn').onclick = () => skipToNext();
        document.getElementById('clearBtn').onclick = () => { el.input.value = ""; };
        document.getElementById('musicBtn').onclick = toggleMusic;
        el.input.onkeypress = (e) => { if (e.key === 'Enter') checkAnswer(); };
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.onclick = () => changeDifficulty(btn.dataset.diff);
        });
        
        initAudio();
        changeDifficulty('normal');
        
        console.log("游戏已加载，共 " + POEMS.length + " 首诗词");
        console.log("功能：不能提交空白 | 错题停留5秒 | 错题间隔3-5题重出 | 易错字红色标注");
    </script>
</body>
</html>
